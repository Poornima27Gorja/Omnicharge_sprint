spring.application.name=api-gateway
server.port=8080

# -Eureka (Docker hostname) 
# FOR LOCAL:
#eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
# FOR DOCKER:
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/

# JWT 
jwt.secret=OmniChargeSecretKeyForJWTTokenGenerationAndValidation2024

# User Service Routes 
spring.cloud.gateway.routes[0].id=user-service-auth
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[1].id=user-service-users
spring.cloud.gateway.routes[1].uri=lb://user-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/users/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=0

# Operator Service Routes 
spring.cloud.gateway.routes[2].id=operator-service-operators
spring.cloud.gateway.routes[2].uri=lb://operator-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/operators/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[3].id=operator-service-plans
spring.cloud.gateway.routes[3].uri=lb://operator-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/plans/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=0

# Recharge Service Routes 
spring.cloud.gateway.routes[4].id=recharge-service-initiate
spring.cloud.gateway.routes[4].uri=lb://recharge-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/recharge/initiate
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[5].id=recharge-service-history
spring.cloud.gateway.routes[5].uri=lb://recharge-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/recharge/my-history
spring.cloud.gateway.routes[5].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[6].id=recharge-service-all
spring.cloud.gateway.routes[6].uri=lb://recharge-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/recharge/all
spring.cloud.gateway.routes[6].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[7].id=recharge-service-status
spring.cloud.gateway.routes[7].uri=lb://recharge-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/recharge/status/**
spring.cloud.gateway.routes[7].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[8].id=recharge-service-mobile
spring.cloud.gateway.routes[8].uri=lb://recharge-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/recharge/mobile/**
spring.cloud.gateway.routes[8].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[9].id=recharge-service-by-id
spring.cloud.gateway.routes[9].uri=lb://recharge-service
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/recharge/{id}
spring.cloud.gateway.routes[9].filters[0]=StripPrefix=0

# Payment Service Routes 
spring.cloud.gateway.routes[10].id=payment-service-my-transactions
spring.cloud.gateway.routes[10].uri=lb://payment-service
spring.cloud.gateway.routes[10].predicates[0]=Path=/api/transactions/my-transactions
spring.cloud.gateway.routes[10].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[11].id=payment-service-all
spring.cloud.gateway.routes[11].uri=lb://payment-service
spring.cloud.gateway.routes[11].predicates[0]=Path=/api/transactions/all
spring.cloud.gateway.routes[11].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[12].id=payment-service-status
spring.cloud.gateway.routes[12].uri=lb://payment-service
spring.cloud.gateway.routes[12].predicates[0]=Path=/api/transactions/status/**
spring.cloud.gateway.routes[12].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[13].id=payment-service-mobile
spring.cloud.gateway.routes[13].uri=lb://payment-service
spring.cloud.gateway.routes[13].predicates[0]=Path=/api/transactions/mobile/**
spring.cloud.gateway.routes[13].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[14].id=payment-service-txn
spring.cloud.gateway.routes[14].uri=lb://payment-service
spring.cloud.gateway.routes[14].predicates[0]=Path=/api/transactions/txn/**
spring.cloud.gateway.routes[14].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[15].id=payment-service-recharge
spring.cloud.gateway.routes[15].uri=lb://payment-service
spring.cloud.gateway.routes[15].predicates[0]=Path=/api/transactions/recharge/**
spring.cloud.gateway.routes[15].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[16].id=payment-service-pay
spring.cloud.gateway.routes[16].uri=lb://payment-service
spring.cloud.gateway.routes[16].predicates[0]=Path=/api/transactions/pay
spring.cloud.gateway.routes[16].filters[0]=StripPrefix=0

# Swagger API-docs routes (forward /[service]/v3/api-docs \u2192 each service) 
spring.cloud.gateway.routes[17].id=user-service-swagger
spring.cloud.gateway.routes[17].uri=lb://user-service
spring.cloud.gateway.routes[17].predicates[0]=Path=/user-service/v3/api-docs
spring.cloud.gateway.routes[17].filters[0]=RewritePath=/user-service/v3/api-docs,/v3/api-docs

spring.cloud.gateway.routes[18].id=operator-service-swagger
spring.cloud.gateway.routes[18].uri=lb://operator-service
spring.cloud.gateway.routes[18].predicates[0]=Path=/operator-service/v3/api-docs
spring.cloud.gateway.routes[18].filters[0]=RewritePath=/operator-service/v3/api-docs,/v3/api-docs

spring.cloud.gateway.routes[19].id=recharge-service-swagger
spring.cloud.gateway.routes[19].uri=lb://recharge-service
spring.cloud.gateway.routes[19].predicates[0]=Path=/recharge-service/v3/api-docs
spring.cloud.gateway.routes[19].filters[0]=RewritePath=/recharge-service/v3/api-docs,/v3/api-docs

spring.cloud.gateway.routes[20].id=payment-service-swagger
spring.cloud.gateway.routes[20].uri=lb://payment-service
spring.cloud.gateway.routes[20].predicates[0]=Path=/payment-service/v3/api-docs
spring.cloud.gateway.routes[20].filters[0]=RewritePath=/payment-service/v3/api-docs,/v3/api-docs

# SpringDoc \u2014 aggregate all services in one Gateway Swagger UI 
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.urls[0].name=User Service
springdoc.swagger-ui.urls[0].url=/user-service/v3/api-docs
springdoc.swagger-ui.urls[1].name=Operator Service
springdoc.swagger-ui.urls[1].url=/operator-service/v3/api-docs
springdoc.swagger-ui.urls[2].name=Recharge Service
springdoc.swagger-ui.urls[2].url=/recharge-service/v3/api-docs
springdoc.swagger-ui.urls[3].name=Payment Service
springdoc.swagger-ui.urls[3].url=/payment-service/v3/api-docs
springdoc.swagger-ui.disable-swagger-default-url=true

# Actuator 
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always